esphome:
  name: arlec-desk-lights
  friendly_name: Arlec Desk Lights

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: arduino

logger:

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  output_power: 8.5dB
  ap:
    ssid: "Arlec Desk Lights Fallback"
    password: !secret ap_password

captive_portal:

light:
  - platform: neopixelbus
    id: strip_1
    name: "Strip 1"
    type: GRB
    variant: WS2811
    pin: GPIO0
    num_leds: 10
    method:
      type: esp32_rmt
      channel: 0
    restore_mode: RESTORE_DEFAULT_OFF
    effects:
      - addressable_rainbow:
          name: Rainbow
      - addressable_color_wipe:
          name: Color Wipe
      - addressable_scan:
          name: Scan
      - pulse:
          name: Pulse

  - platform: partition
    name: "Strip 1 - S1"
    segments:
      - id: strip_1
        from: 0
        to: 3
  - platform: partition
    name: "Strip 1 - S2"
    segments:
      - id: strip_1
        from: 4
        to: 4
  - platform: partition
    name: "Strip 1 - S3"
    segments:
      - id: strip_1
        from: 5
        to: 5
  - platform: partition
    name: "Strip 1 - S4"    
    segments:
      - id: strip_1
        from: 6
        to: 9

  - platform: neopixelbus
    id: strip_2
    name: "Strip 2"
    type: GRB
    variant: WS2811
    pin: GPIO10
    num_leds: 10
    method:
      type: esp32_rmt
      channel: 1
    restore_mode: RESTORE_DEFAULT_OFF
    effects:
      - addressable_rainbow:
          name: Rainbow
      - addressable_color_wipe:
          name: Color Wipe
      - addressable_scan:
          name: Scan
      - pulse:
          name: Pulse

  - platform: partition
    name: "Strip 2 - S1"
    segments:      
      - id: strip_2
        from: 0
        to: 3   
  - platform: partition
    name: "Strip 2 - S2"
    segments:
      - id: strip_2
        from: 4
        to: 4
  - platform: partition  
    name: "Strip 2 - S3"
    segments: 
      - id: strip_2  
        from: 5
        to: 5
  - platform: partition 
    name: "Strip 2 - S4"
    segments:
      - id: strip_2
        from: 6
        to: 9

binary_sensor:
  - platform: gpio
    id: button_sound
    name: "Button Sound"
    pin:
      number: GPIO3
      mode: INPUT_PULLUP
      inverted: true
    filters:
      - delayed_on: 10ms
    on_click:
      - min_length: 10ms
        max_length: 350ms
        then:
          - homeassistant.event:
              event: esphome.desk_button_sound_short
      - min_length: 350ms
        max_length: 2000ms
        then:
          - homeassistant.event:
              event: esphome.desk_button_sound_long

  - platform: gpio
    id: button_power
    name: "Button Power"
    pin:
      number: GPIO1
      mode: INPUT_PULLUP
      inverted: true
    filters:
      - delayed_on: 10ms
    on_click:
      - min_length: 10ms
        max_length: 350ms
        then:
          - homeassistant.event:
              event: esphome.desk_button_power_short
      - min_length: 350ms
        max_length: 2000ms
        then:
          - homeassistant.event:
              event: esphome.desk_button_power_long

